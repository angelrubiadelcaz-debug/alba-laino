<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Angel Moment</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Escena interactiva con tres figuras">
      <canvas id="confetti" aria-hidden="true"></canvas>

      <div class="scene">
        <div class="moon" aria-hidden="true"></div>
        <div class="string string-a" aria-hidden="true"></div>
        <div class="string string-b" aria-hidden="true"></div>
        <div class="pisa-gag" aria-hidden="true">
          <div class="pisa-tower">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="cafe-bg" aria-hidden="true">
          <div class="cafe-awning"></div>
          <div class="cafe-sign">VoltaPagina</div>
          <div class="cafe-window">
            <span class="piano-lid"></span>
            <span class="piano-body"></span>
            <span class="piano-keys"></span>
          </div>
          <div class="cafe-door"></div>
        </div>

        <details class="wardrobe">
          <summary>Ropa</summary>
          <div class="wardrobe-card">
            <span>Alba</span>
            <div class="wardrobe-buttons">
              <button class="outfit-button active" data-person="blonde" data-outfit="normal" type="button">Normal</button>
              <button class="outfit-button" data-person="blonde" data-outfit="traditional" type="button">Tradicional</button>
              <button class="outfit-button" data-person="blonde" data-outfit="clown" type="button">Payaso</button>
            </div>
          </div>
          <div class="wardrobe-card">
            <span>Laino</span>
            <div class="wardrobe-buttons">
              <button class="outfit-button active" data-person="brunette" data-outfit="normal" type="button">Normal</button>
              <button class="outfit-button" data-person="brunette" data-outfit="traditional" type="button">Tradicional</button>
              <button class="outfit-button" data-person="brunette" data-outfit="clown" type="button">Payaso</button>
            </div>
          </div>
          <div class="wardrobe-card">
            <span>Niya</span>
            <div class="wardrobe-buttons">
              <button class="outfit-button active" data-person="niya" data-outfit="normal" type="button">Normal</button>
              <button class="outfit-button" data-person="niya" data-outfit="traditional" type="button">Tradicional</button>
              <button class="outfit-button" data-person="niya" data-outfit="clown" type="button">Payaso</button>
            </div>
          </div>
        </details>

        <article class="doll doll-left outfit-normal" data-person="blonde" tabindex="0" aria-label="Alba con gafas">
          <div class="bubble">Ay Angel estoy cansada</div>
          <div class="head">
            <div class="hair hair-curly"></div>
            <div class="face">
              <span class="glasses left-lens"></span>
              <span class="glasses right-lens"></span>
              <span class="bridge"></span>
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="smile"></span>
            </div>
          </div>
          <div class="torso cream">
            <span class="collar"></span>
          </div>
          <div class="arm arm-left"></div>
          <div class="arm arm-right"></div>
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
        </article>

        <article class="doll doll-right outfit-normal" data-person="brunette" tabindex="0" aria-label="Laino con camiseta de rayas">
          <div class="bubble">Ja ja, Angel calvo. Aupa!</div>
          <div class="earring earring-left"></div>
          <div class="earring earring-right"></div>
          <div class="head">
            <div class="hair hair-pigtails"></div>
            <div class="face">
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="smile"></span>
            </div>
          </div>
          <div class="torso striped"></div>
          <div class="arm arm-left stripe-arm"></div>
          <div class="arm arm-right stripe-arm"></div>
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
        </article>

        <article class="doll doll-center outfit-normal" data-person="niya" tabindex="0" aria-label="Niya con jersey rojo">
          <div class="bubble">Az sam Niya</div>
          <div class="earring earring-left"></div>
          <div class="earring earring-right"></div>
          <div class="head">
            <div class="hair hair-long"></div>
            <div class="face">
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="smile"></span>
            </div>
          </div>
          <div class="necklace"></div>
          <div class="torso red-sweater"></div>
          <div class="arm arm-left red-arm"></div>
          <div class="arm arm-right red-arm"></div>
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
        </article>

        <details class="games-menu">
          <summary>Juegos</summary>
          <button id="poopToggle" class="game-button" type="button" aria-pressed="false">Baño</button>
          <button id="flagToggle" class="game-button" type="button" aria-pressed="false">Laberinto</button>
        </details>

        <section class="bathroom-scores" aria-label="Marcador del baño">
          <div class="bath-score bath-score-alba"><span id="poopCountAlba">0</span> Cacas Alba</div>
          <div class="bath-score bath-score-laino"><span id="poopCountLaino">0</span> Cacas Laino</div>
          <div class="bath-score bath-score-niya"><span id="poopCountNiya">0</span> Cacas Niya</div>
        </section>

        <section class="flag-scores" aria-label="Marcador del laberinto">
          <div class="flag-score flag-score-alba"><span id="flagCountAlba">0</span> Salidas Alba</div>
          <div class="flag-score flag-score-laino"><span id="flagCountLaino">0</span> Salidas Laino</div>
          <div class="flag-score flag-score-niya"><span id="flagCountNiya">0</span> Salidas Niya</div>
        </section>

        <div id="mazeStatus" class="maze-status" aria-live="polite">Nivel 1</div>
        <div id="mazeBoard" class="maze-board" aria-hidden="true"></div>
        <section class="maze-controls" aria-label="Controles del laberinto">
          <div class="maze-pad maze-pad-alba" aria-label="Alba">
            <button type="button" data-person="blonde" data-dc="0" data-dr="-1">W</button>
            <button type="button" data-person="blonde" data-dc="-1" data-dr="0">A</button>
            <button type="button" data-person="blonde" data-dc="0" data-dr="1">S</button>
            <button type="button" data-person="blonde" data-dc="1" data-dr="0">D</button>
          </div>
          <div class="maze-pad maze-pad-laino" aria-label="Laino">
            <button type="button" data-person="brunette" data-dc="0" data-dr="-1">↑</button>
            <button type="button" data-person="brunette" data-dc="-1" data-dr="0">←</button>
            <button type="button" data-person="brunette" data-dc="0" data-dr="1">↓</button>
            <button type="button" data-person="brunette" data-dc="1" data-dr="0">→</button>
          </div>
          <div class="maze-pad maze-pad-niya" aria-label="Niya">
            <button type="button" data-person="niya" data-dc="0" data-dr="-1">I</button>
            <button type="button" data-person="niya" data-dc="-1" data-dr="0">J</button>
            <button type="button" data-person="niya" data-dc="0" data-dr="1">K</button>
            <button type="button" data-person="niya" data-dc="1" data-dr="0">L</button>
          </div>
        </section>

        <div class="caption" aria-hidden="true">mueve las figuras y toca sus caras</div>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
